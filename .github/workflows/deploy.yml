name: Deploy to GitHub Pages

on:
  push:
    branches: [main]

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'

      - name: Publish
        run: dotnet publish -c Release -o publish

      - name: Verify publish output
        run: |
          echo "=== publish/wwwroot/ top-level ==="
          ls -la publish/wwwroot/
          echo "=== _framework files ==="
          ls publish/wwwroot/_framework/ | head -10

      - name: Patch base href for GitHub Pages sub-path
        # Replace <base href="/" /> with the repo name so assets resolve correctly
        run: |
          sed -i 's|<base href="/" />|<base href="/engagement/" />|g' publish/wwwroot/index.html
          grep 'base href' publish/wwwroot/index.html

      - name: Prevent Jekyll from ignoring _framework
        run: touch publish/wwwroot/.nojekyll

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: publish/wwwroot

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
