name: Deploy to GitHub Pages

on:
  push:
    branches: [main]

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'

      - name: Install wasm-tools workload
        run: dotnet workload install wasm-tools

      - name: Publish
        run: dotnet publish -c Release -o publish

      - name: Fix base href for custom domain
        run: |
          sed -i 's|<base href="/Engagement/" />|<base href="/" />|g' publish/wwwroot/index.html
          sed -i 's|<base href="/engagement/" />|<base href="/" />|g' publish/wwwroot/index.html
          echo "Base href fixed"

      - name: Copy CNAME
        run: |
          cp wwwroot/CNAME publish/wwwroot/CNAME
          echo "CNAME contents:"
          cat publish/wwwroot/CNAME

      - name: Verify publish output
        run: |
          echo "=== wwwroot top-level ==="
          ls -la publish/wwwroot/
          echo "=== css ==="
          ls publish/wwwroot/css/ 2>/dev/null || echo "(missing)"
          echo "=== js ==="
          ls publish/wwwroot/js/  2>/dev/null || echo "(missing)"
          echo "=== _framework (first 10) ==="
          ls publish/wwwroot/_framework/ 2>/dev/null | head -10 || echo "(missing)"

      - name: Create dashboard route
        run: |
          mkdir -p publish/wwwroot/dashboard
          cp publish/wwwroot/index.html publish/wwwroot/dashboard/index.html
          echo "Created dashboard/index.html"

      - name: Prevent Jekyll from ignoring _framework
        run: touch publish/wwwroot/.nojekyll

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: publish/wwwroot

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
