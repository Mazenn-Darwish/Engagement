    <script>
        // Decode path restored by 404.html redirect
        (function(l) {
            if (l.search[1] === '/') {
                var decoded = l.search.slice(1).split('&').map(function(s) {
                    return s.replace(/~and~/g, '&');
                }).join('?');
                window.history.replaceState(null, null, l.pathname.slice(0, -1) + decoded + l.hash);
            }
        }(window.location));

    <script>
        function hideLoader() {
            const el = document.getElementById('blazor-loading');
            if (!el) return;
            el.style.transition = 'opacity 0.9s ease';
            el.style.opacity = '0';
            setTimeout(() => el.remove(), 950);
        }

        // ── Analytics: count one visit per browser session ───
        async function countVisit() {
            if (sessionStorage.getItem('v')) return;
            sessionStorage.setItem('v', '1');
            const url = 'https://script.google.com/macros/s/AKfycbxdztj6hVbv5g6jI9exXrESUBTGmNE4yy8hbEFYJOv7NfQHsodKPLlhDCMc7S7jw7RT/exec';

            // ── Geo + ISP ────────────────────────────────────────
            let ip = '', city = '', region = '', country = '', isp = '';
            try {
                const r = await fetch('https://ipapi.co/json/');
                const j = await r.json();
                ip      = j.ip           || '';
                city    = j.city         || '';
                region  = j.region       || '';
                country = j.country_name || '';
                isp     = (j.org || '').replace(/^AS\d+\s+/, ''); // strip ASN prefix
            } catch (_) {}

            // ── Device type (iPad on Safari sends desktop UA — fix with maxTouchPoints) ──
            const ua       = navigator.userAgent;
            const isIPad   = /Macintosh/i.test(ua) && navigator.maxTouchPoints > 1;
            const isTablet = /iPad|Tablet/i.test(ua) || isIPad;
            const isMobile = /Mobi|Android|iPhone|iPad/i.test(ua);
            const deviceType = isTablet ? 'Tablet' : isMobile ? 'Mobile' : 'Desktop';

            // ── OS + version ──────────────────────────────────────
            let os = 'Unknown';
            if      (/iPhone/.test(ua))       { const m = ua.match(/OS (\d+_\d+)/);  os = 'iOS '     + (m ? m[1].replace('_','.') : ''); }
            else if (isIPad || /iPad/.test(ua)){ const m = ua.match(/OS (\d+_\d+)/); os = 'iPadOS '  + (m ? m[1].replace('_','.') : ''); }
            else if (/Android/.test(ua))       { const m = ua.match(/Android ([\d.]+)/); os = 'Android ' + (m ? m[1] : ''); }
            else if (/Windows NT/.test(ua))    { const m = ua.match(/Windows NT ([\d.]+)/); const v = {'10.0':'10/11','6.3':'8.1','6.2':'8','6.1':'7'}; os = 'Windows ' + (v[m && m[1]] || (m && m[1]) || ''); }
            else if (/Mac OS X/.test(ua))      { const m = ua.match(/Mac OS X ([\d_]+)/); os = 'macOS ' + (m ? m[1].replace(/_/g,'.') : ''); }
            else if (/Linux/.test(ua))         { os = 'Linux'; }

            // ── Device model (Android exposes it; iPhone never does post-iOS 13) ──
            let model = '';
            try {
                if (navigator.userAgentData) {
                    const h = await navigator.userAgentData.getHighEntropyValues(['model']);
                    if (h.model) model = h.model;
                }
            } catch (_) {}
            if (!model) {
                const s = ua.match(/;\s*(SM-[A-Z0-9]+)/i);   if (s) model = s[1];       // Samsung
                const p = ua.match(/(Pixel\s[\d\w]+)/);       if (p) model = p[1];       // Pixel
                const x = ua.match(/;\s*([A-Z]{2,4}-[A-Z0-9]{4,})\)/); if (x) model = x[1]; // Huawei/others
            }

            // ── Browser ───────────────────────────────────────────
            let browser = 'Unknown';
            if      (/Edg/i.test(ua))     browser = 'Edge';
            else if (/Chrome/i.test(ua))  browser = 'Chrome';
            else if (/Firefox/i.test(ua)) browser = 'Firefox';
            else if (/Safari/i.test(ua))  browser = 'Safari';

            const screenSize = window.screen.width + 'x' + window.screen.height;

            fetch(url, {
                method: 'POST', mode: 'no-cors',
                body: JSON.stringify({ type: 'visit', ip, city, region, country, isp, deviceType, os, model, browser, screenSize })
            }).catch(() => {});
        }

        // ── Signature canvas ──────────────────────────────────
        function initSignatureCanvas(canvasId) {
            const canvas = document.getElementById(canvasId);
            if (!canvas) return;
            const wrap = canvas.closest('.sig-canvas-wrap');
            const ctx  = canvas.getContext('2d');
            let drawing = false;
            let lastPos = null;

            ctx.strokeStyle = '#2d5a27';
            ctx.lineWidth   = 2.5;
            ctx.lineCap     = 'round';
            ctx.lineJoin    = 'round';

            function getPos(e) {
                const r = canvas.getBoundingClientRect();
                const sx = canvas.width  / r.width;
                const sy = canvas.height / r.height;
                const src = e.touches ? e.touches[0] : e;
                return { x: (src.clientX - r.left) * sx, y: (src.clientY - r.top) * sy };
            }

            function onStart(e) {
                e.preventDefault();
                drawing = true;
                lastPos = getPos(e);
                if (wrap) wrap.classList.add('has-content');
            }

            function onMove(e) {
                if (!drawing) return;
                e.preventDefault();
                const pos = getPos(e);
                ctx.beginPath();
                ctx.moveTo(lastPos.x, lastPos.y);
                ctx.lineTo(pos.x, pos.y);
                ctx.stroke();
                lastPos = pos;
            }

            function onEnd() { drawing = false; lastPos = null; }

            canvas.addEventListener('mousedown',  onStart);
            canvas.addEventListener('mousemove',  onMove);
            canvas.addEventListener('mouseup',    onEnd);
            canvas.addEventListener('mouseleave', onEnd);
            canvas.addEventListener('touchstart', onStart, { passive: false });
            canvas.addEventListener('touchmove',  onMove,  { passive: false });
            canvas.addEventListener('touchend',   onEnd);
        }

        function clearSignatureCanvas(canvasId) {
            const canvas = document.getElementById(canvasId);
            if (!canvas) return;
            canvas.getContext('2d').clearRect(0, 0, canvas.width, canvas.height);
            const wrap = canvas.closest('.sig-canvas-wrap');
            if (wrap) wrap.classList.remove('has-content');
        }

        function isSignatureEmpty(canvasId) {
            const canvas = document.getElementById(canvasId);
            if (!canvas) return true;
            const data = canvas.getContext('2d').getImageData(0, 0, canvas.width, canvas.height).data;
            for (let i = 3; i < data.length; i += 4) {
                if (data[i] > 0) return false;
            }
            return true;
        }

        function getSignatureDataUrl(canvasId) {
            const canvas = document.getElementById(canvasId);
            return canvas ? canvas.toDataURL('image/png') : '';
        }

        async function postToSheet(url, payload) {
            try {
                await fetch(url, {
                    method: 'POST',
                    mode: 'no-cors',
                    body: JSON.stringify(payload)
                });
                return true;
            } catch (e) {
                return false;
            }
        }

        async function fetchSheetData(url) {
            try {
                const r = await fetch(url, { method: 'GET', mode: 'cors' });
                return await r.text();
            } catch (e) {
                return null;
            }
        }

        // Music search — tries Apps Script proxy first (works on mobile), falls back to iTunes direct (works on desktop)
        var _scriptBase = 'https://script.google.com/macros/s/AKfycbxdztj6hVbv5g6jI9exXrESUBTGmNE4yy8hbEFYJOv7NfQHsodKPLlhDCMc7S7jw7RT/exec';
        async function searchMusic(query) {
            // 1. Try Apps Script proxy (server-side fetch bypasses Apple's mobile UA block)
            try {
                var r = await fetch(_scriptBase + '?action=musicSearch&q=' + encodeURIComponent(query),
                                    { method: 'GET', mode: 'cors' });
                if (r.ok) {
                    var text = await r.text();
                    var json = JSON.parse(text);
                    if (json && json.success === true) return text;
                }
            } catch(e) {}

            // 2. Fall back to iTunes directly (works on desktop, blocked on mobile by Apple)
            try {
                var r2 = await fetch('https://itunes.apple.com/search?term=' + encodeURIComponent(query)
                                   + '&media=music&entity=song&limit=10&country=us',
                                     { method: 'GET', mode: 'cors' });
                if (r2.ok) {
                    var data = await r2.json();
                    return JSON.stringify({ success: true, results: (data.results || []).map(function(t) {
                        return { trackName: t.trackName || '', artistName: t.artistName || '', artworkUrl100: t.artworkUrl100 || '' };
                    })});
                }
            } catch(e) {}

            return null;
        }

        // Native input listener for song search — bypasses Blazor @oninput on mobile
        function initSongSearchInput(dotnetRef) {
            const input = document.getElementById('song-search-input');
            if (!input || input._songAttached) return;
            input._songAttached = true;
            input.addEventListener('input', function() {
                dotnetRef.invokeMethodAsync('JsSongInput', input.value || '').catch(function(){});
            });
        }

        function openSignature(dataUrl) {
            const w = window.open('', '_blank');
            if (!w) return;
            w.document.write('<body style="margin:0;background:#111;display:flex;align-items:center;justify-content:center;min-height:100vh"><img src="' + dataUrl + '" style="max-width:100vw;max-height:100vh;display:block"></body>');
            w.document.close();
        }

        function downloadIcs(content, filename) {
            const blob = new Blob([content], { type: 'text/calendar;charset=utf-8' });
            const url  = URL.createObjectURL(blob);
            const a    = document.createElement('a');
            a.href     = url;
            a.download = filename;
            document.body.appendChild(a);
            a.click();
            document.body.removeChild(a);
            URL.revokeObjectURL(url);
        }
    </script>
